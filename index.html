<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#19413a" />
    <title>Humanity Pathways Global</title>
    <meta
      name="description"
      content="Humanity Pathways Global is a multi-page React site highlighting the organization's mission, initiatives, events, sponsorship opportunities, and ways to get involved."
    />
    <meta name="author" content="Humanity Pathways Global" />
    <link rel="icon" type="image/x-icon" href="%BASE_URL%favicon.ico" />

    <meta property="og:title" content="Humanity Pathways Global" />
    <meta
      property="og:description"
      content="Explore Humanity Pathways Global's mission, programs, leadership, and engagement opportunities."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="%BASE_URL%placeholder.svg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Humanity Pathways Global" />
    <meta
      name="twitter:description"
      content="Explore Humanity Pathways Global's mission, programs, leadership, and engagement opportunities."
    />
    <meta name="twitter:image" content="%BASE_URL%placeholder.svg" />

    <script>
      (function (location) {
        if (location.search[1] !== "/") {
          return;
        }

        const decodedRoute = location.search
          .slice(1)
          .split("&")
          .map((segment) => segment.replace(/~and~/g, "&"))
          .join("?");
        const basePath = "%BASE_URL%" === "/" ? "" : "%BASE_URL%".replace(/\/$/, "");

        window.history.replaceState(null, "", `${basePath}${decodedRoute}${location.hash}`);
      })(window.location);
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
